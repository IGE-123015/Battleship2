name: qodana_Too_Many_Methods.yml

on:
  push:
    branches: [ master ]
  pull_request: 
    branches: [ master ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2024.1
        with:
          # fail-threshold: 0 faz com que o build falhe
          # se houver QUALQUER instância deste code smell
          args: --fail-threshold,0
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
