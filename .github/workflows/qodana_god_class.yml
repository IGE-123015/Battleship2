# Aluno: 112949 - Pedro Santana
name: Qodana-God-Class
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Qodana-Scan
        uses: JetBrains/qodana-action@v2023.2
        with:
          args: >
            --property=qodana.inspections.config.path=qodana.yaml
      - name: Check
        run: echo "Analise concluida"