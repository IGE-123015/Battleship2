name: Qodana - God Class Detection

on:
  push:
    branches: [ main, master ] # Adicionei as duas para garantir
  pull_request:
    branches: [ main, master ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2023.2
        with:
          args: >
            --property=qodana.inspections.config.path=qodana.yaml
        env: # O 'env' tem de estar aqui, alinhado com o 'with'
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: 'Check Quality Gate'
        run: |
          echo "Verificando instâncias de God Class..."